title: Selfhosted Poland
description: "Katalog narzędzi self-hosted z opiniami i wymaganiami po polsku"
baseurl: ""
url: "https://selfhosted.giemza.nl"

# Just the Docs theme
remote_theme: just-the-docs/just-the-docs@v0.10.0

# SEO
lang: pl
author: Tomasz Giemza

# Wygląd
color_scheme: light
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Nawigacja
nav_sort: case_insensitive
heading_anchors: true

# Stopka
gh_edit_link: false
footer_content: "© 2025 Tomasz Giemza · <a href='https://giemza.nl'>giemza.nl</a>"

# SEO plugin
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Wyklucz z buildu
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
